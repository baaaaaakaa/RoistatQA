<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revert Form</title>

  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e6eaf2;

      --primary1:#2f80ed;

      --shadow: 0 18px 60px rgba(17,24,39,.10);
      --shadow2: 0 10px 30px rgba(17,24,39,.08);

      --radius:16px;
      --radiusSm:12px;

      --focusBorder: rgba(47,128,237,.55);
      --focusRing: 0 0 0 4px rgba(47,128,237,.16);

      --container: 1000px;

      --headingColor: rgb(71, 71, 102);
      --secondaryText: rgb(0, 105, 229);

      --font: "PT Sans", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans";
    }

    *{ box-sizing:border-box; }
    html, body { height: auto; min-height: 100%; }

    body{
      margin:0;
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.45;
      color: var(--text);
      background:
        radial-gradient(1100px 500px at 50% -50px, rgba(47,128,237,.10), transparent 60%),
        radial-gradient(900px 420px at 10% 0%, rgba(109,94,252,.08), transparent 55%),
        var(--bg);
      padding: 48px 18px 72px;
    }

    body, button, input, select, textarea, pre {
      font-family: var(--font);
    }

    .container{
      width:100%;
      max-width: var(--container);
      margin: 0 auto;
    }

    .card{
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow2);
      padding: 20px 20px 18px;
    }

    .sectionHeading{
      text-size-adjust: 100%;
      font-size: 28px;
      font-weight: 600;
      line-height: 36px;
      text-align: left;
      color: var(--headingColor);
      margin: 0 0 10px;
      letter-spacing: -0.01em;
    }

    .field{
      margin-top: 14px;
    }

    label{
      display:block;
      margin: 0 0 6px;
      font-size: 13px;
      color: var(--muted);
    }

    input, select, textarea{
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radiusSm);
      padding: 12px 12px;
      font-size: 14px;
      outline: none;
      background:#fff;
      color: var(--text);
      transition: box-shadow .15s ease, border-color .15s ease;
    }

    textarea{ resize: vertical; min-height: 96px; }

    input:focus, select:focus, textarea:focus{
      border-color: var(--focusBorder);
      box-shadow: var(--focusRing);
    }

    .actions{
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button{
      border: 0;
      border-radius: 4px;
      padding: 6px 12px;
      font-weight: 400;
      cursor: pointer;
      transition: transform .06s ease, background .18s ease, filter .18s ease, border-color .18s ease;
      font-size: 14px;
      letter-spacing: -0.01em;
      line-height: 20px;
      box-shadow: none !important;
    }
    button:active{ transform: translateY(1px); }
    button:focus{ outline:none; }
    button:focus-visible{ box-shadow: 0 0 0 4px rgba(47,128,237,.20) !important; }

    .btn-primary{
      color:#fff;
      background: #2589ff;
    }
    .btn-primary:hover{
      background: #0069E5;
    }

    .btn-secondary{
      color: var(--secondaryText);
      background:#ffffff;
      border: 1px solid #D1D4D6;
    }
    .btn-secondary:hover{
      background:#EFF6FF;
    }

    pre{
      background:#0b1220;
      color:#e5e7eb;
      padding: 14px 14px;
      border-radius: var(--radiusSm);
      overflow:auto;
      white-space: pre-wrap;
      line-height: 1.55;
      margin: 0;
      border: 1px solid rgba(255,255,255,.06);
      text-align: left;
      min-height: 72px;
    }

    .stack{
      display:grid;
      gap: 18px;
      margin-top: 18px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1 class="sectionHeading">Запрос на откат</h1>

      <form id="RevertForm">
        <div class="field">
          <label for="pr">PR:</label>
          <input type="text" id="pr" name="pr" required />
        </div>

        <div class="field">
          <label for="commit">Коммит:</label>
          <input type="text" id="commit" name="commit" required />
        </div>

        <div class="field">
          <label for="dev">Разработчик:</label>
          <select id="dev" name="dev" required></select>
        </div>

        <div class="field">
          <label for="prichina">Причина:</label>
          <textarea id="prichina" name="prichina" required></textarea>
        </div>

        <div class="field">
          <label for="where">Где:</label>
          <select id="where" name="where" required></select>
        </div>

        <div class="actions">
          <button class="btn-primary" type="button" onclick="generateOutput()">Сгенерировать сообщение</button>
        </div>
      </form>
    </div>

    <div class="stack">
      <div class="card">
        <h2 class="sectionHeading">Готовое сообщение</h2>
        <pre id="output"></pre>
        <div class="actions">
          <button class="btn-primary" id="copyButton" type="button" onclick="copyOutput()">Скопировать</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const developers = [
      "@faust.v",
  "@fedoseev.m",
  "@fedotov.a",
  "@govorov.v ",
  "@grigorieva.o",
  "@gubkin.vi",
  "@hi",
  "@homyakov.a",
  "@kharkov.p",
  "@kn",
  "@kondratov.d",
  "@konnov.a",
  "@kozlov.n ",
  "@lg ",
  "@lobashkov.p",
  "@mukhametshin.a",
  "@odegov.a",
  "@okhotnikov.a",
  "@panchenko.s",
  "@petrov.an",
  "@petrunenkova.s",
  "@plesheshnikova.a",
  "@ponomarev.a",
  "@safronova.d ",
  "@shironosova.a",
  "@spitsyna.i",
  "@trubinov.a",
  "@unychenko.d",
  "@usov.a",
  "@yarullina.a",
  "@zakharov.i",
    ];
    const wher = ["На бета сервере", "На бою"];

    const populateDropdown = (id, options) => {
      const dropdown = document.getElementById(id);
      dropdown.innerHTML = "";
      options.forEach((option) => {
        const opt = document.createElement("option");
        opt.value = option;
        opt.textContent = option;
        dropdown.appendChild(opt);
      });
    };

    populateDropdown("dev", developers);
    populateDropdown("where", wher);

    const generateOutput = () => {
      const form = document.getElementById("RevertForm");
      document.getElementById("output").textContent = `
**PR:** ${form.pr.value}
**Коммит:** ${form.commit.value}
**Разработчик:** ${form.dev.value}
**Причина:** ${form.prichina.value}
**Где:** ${form.where.value}`.trim();
    };

    const copyOutput = () => {
      const output = document.getElementById("output");
      const textarea = document.createElement("textarea");
      textarea.value = output.textContent.trim();
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      document.body.removeChild(textarea);
      alert("Output copied to clipboard");
    };
  </script>
</body>
</html>
