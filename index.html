<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QA Links</title>

  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e6eaf2;

      --shadow: 0 10px 30px rgba(17,24,39,.08);
      --radius:16px;

      --container: 1000px;

      --headingColor: rgb(71, 71, 102);
      --secondaryText: rgb(0, 105, 229);
      --font: "PT Sans", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans";
    }

    *{ box-sizing:border-box; }
    html, body { height:auto; min-height:100%; }

    body{
      margin:0;
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.45;
      color: var(--text);
      background:
        radial-gradient(1100px 500px at 50% -50px, rgba(47,128,237,.10), transparent 60%),
        radial-gradient(900px 420px at 10% 0%, rgba(109,94,252,.08), transparent 55%),
        var(--bg);
      padding: 48px 18px 48px;
    }

    body, button { font-family: var(--font); }

    .container{
      width:100%;
      max-width: var(--container);
      margin: 0 auto;
    }

    .card{
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 20px 18px;
    }

    /* Layout: left (2fr) + right (1fr) */
    .layout{
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 14px;

      /* KEY: vertical centering of grid items (left/right) */
      align-items: center;
    }

    /* Left side: center THIS block vertically inside layout row */
    .left{
      min-width: 0;
      align-self: center; /* explicit: center this grid item vertically */
    }

    .btn-grid{
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 10px;
      justify-items: stretch;
      align-items: stretch;
    }

    /* Bottom two buttons full width of left column */
    .btn-grid > button:nth-child(4),
    .btn-grid > button:nth-child(5){
      grid-column: 1 / -1;
      width: 100%;
    }

    button{
      width: 100%;
      border: 0;
      border-radius: 4px;
      padding: 10px 12px;
      font-weight: 400;
      cursor: pointer;
      transition: transform .06s ease, background .18s ease, border-color .18s ease, color .18s ease;
      font-size: 14px;
      letter-spacing: -0.01em;
      line-height: 20px;
      box-shadow: none !important;
      background: transparent;
    }
    button:active{ transform: translateY(1px); }
    button:focus{ outline:none; }
    button:focus-visible{ box-shadow: 0 0 0 4px rgba(47,128,237,.20) !important; }

    .btn-primary{
      color:#fff;
      background: #2589ff;
    }
    .btn-primary:hover{ background: #0069E5; }

    .btn-secondary{
      color: var(--secondaryText);
      background:#ffffff;
      border: 1px solid #D1D4D6;
    }
    .btn-secondary:hover{ background:#EFF6FF; }

    .btn-revert{
      color:#F35050;
      background:#ffffff;
      border: 1px solid #F35050;
    }
    .btn-revert:hover{ background:#FCCBCBB2; }

    /* Right side image */
    .right{
      min-width: 0;
      display:flex;
      justify-content: flex-end;
      align-items: center;
    }

    .imageWrap{
      width: 100%;
      max-width: 100%;
      border-radius: 14px;
      overflow: hidden;
      border: 0;
      box-shadow: none;
      background: transparent;
      max-height: min(420px, 55vh);
    }
    .imageWrap img{
      width: 100%;
      height: auto;
      max-height: min(420px, 55vh);
      object-fit: contain;
      display:block;
      background: transparent;
    }

    @media (max-width: 1000px){
      .btn-grid{ grid-template-columns: repeat(2, minmax(180px, 1fr)); }
    }

    @media (max-width: 920px){
      body{ padding: 36px 14px 40px; }

      .layout{
        grid-template-columns: 1fr;
        align-items: start;
      }

      .btn-grid{ grid-template-columns: 1fr; }

      .right{ justify-content: center; }

      .imageWrap, .imageWrap img{ max-height: 34vh; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <div class="layout">
        <div class="left">
          <div class="btn-grid">
            <button class="btn-primary" type="button" onclick="openInNewTab('https://hoppscotch.io/')">
              Тестирование API (Hoppscotch)
            </button>

            <button class="btn-primary" type="button" onclick="openInNewTab('https://app.qase.io/')">
              Тест-кейсы (Qase)
            </button>

            <button class="btn-primary" type="button" onclick="openInNewTab('https://docs.google.com/spreadsheets/d/1dFTb3UgsfQG35SZR0v2xmL_ytcI_7LQiUWknua9CBuU/edit?gid=0#gid=0')">
              Таблица релизов (Google Sheets)
            </button>

            <button class="btn-revert" type="button" onclick="openInNewTab('revert.html')">
              Запрос на откат
            </button>

            <button class="btn-secondary" type="button" onclick="openInNewTab('standup.html')">
              Стендап
            </button>
          </div>
        </div>

        <div class="right">
          <div class="imageWrap" aria-label="Мем">
            <img src="sticker.webp" alt="Баги не пройдут!" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function openInNewTab(url){
      window.open(url, "_blank", "noopener,noreferrer");
    }
  </script>
</body>
</html>
